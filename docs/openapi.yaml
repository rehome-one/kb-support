    Архитектурные решения зафиксированы в ADR-0005:

    - Данные User/Booking/Premises/Collaborator — через API основной платформы

    - Ticket и ServiceOrder — разные сущности, связь по ссылке

    - Email — свой IMAP-парсер в контуре РФ

