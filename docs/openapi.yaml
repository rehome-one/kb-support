components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: m2m-доступ (например, от kb-search) — Bearer JWT через Client Credentials
    CookieAuth:
      type: apiKey
      in: cookie
      name: rehome_session
      description: Браузерная сессия оператора/заявителя. scope вычисляется из сессии на бэкенде.
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Идентификатор запроса для трассировки
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Ключ идемпотентности для безопасного повтора POST
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
      description: CSRF-токен для браузерных сессий (CookieAuth)
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Курсор для пагинации (из предыдущего ответа)
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  schemas:
    Error:
      type: object
      description: Ошибка в формате RFC 7807 (problem+json)
      required:
      - type
      - title
      - status
      properties:
        type:
          type: string
          format: uri
          example: https://api.rehome.one/errors/validation
        title:
          type: string
          example: Validation failed
        status:
          type: integer
          example: 422
        detail:
          type: string
        instance:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    Pagination:
      type: object
      properties:
        next_cursor:
          type:
          - string
          - 'null'
          description: Курсор следующей страницы (null если конец)
        has_more:
          type: boolean
    ResponseEnvelope:
      type: object
      description: Общий конверт успешного ответа
      properties:
        data:
          description: Полезная нагрузка (объект или массив)
        request_id:
          type: string
          format: uuid
    TicketStatus:
      type: string
      enum:
      - NEW
      - OPEN
      - PENDING
      - WAITING
      - ESCALATED
      - RESOLVED
      - CLOSED
      - REOPENED
      description: NEW — новое; OPEN — в работе; PENDING — ждёт заявителя; WAITING — ждёт третью сторону (коллаборант/юрист/банк); ESCALATED — на 2-й линии; RESOLVED — решено, ждёт подтверждения; CLOSED — закрыто; REOPENED — переоткрыто
    TicketPriority:
      type: string
      enum:
      - low
      - normal
      - high
      - critical
    TicketType:
      type: string
      enum:
      - PAYMENT
      - CONTRACT
      - MOVE_IN
      - MOVE_OUT
      - MAINTENANCE
      - UTILITIES
      - ACCOUNT
      - LISTING
      - COLLABORATOR
      - COMPLAINT
      - FRAUD
      - COMPENSATION
      - GUARANTEE
      - INSURANCE
      - ACCEPTANCE_ACT
      - OTHER
      description: Тип обращения под предметную область аренды (раздел 3.3 ТЗ)
    TicketChannel:
      type: string
      enum:
      - AI_CHAT
      - EMAIL
      - WEB_FORM
      - PHONE
      - INTERNAL
      - LK_CLAIM
      - INSURER_WEBHOOK
      - SYSTEM
      description: Канал поступления. AI_CHAT — главный (эскалация из kb-search). LK_CLAIM/INSURER_WEBHOOK/SYSTEM — для претензионных типов (v1.1)
    TicketTeam:
      type: string
      enum:
      - support
      - legal
      - finance
      description: Команда обработки
    TicketCaseState:
      type: string
      enum:
      - CLAIM_SUBMITTED
      - DOCS_PENDING
      - UNDER_REVIEW
      - INSPECTION
      - DECISION_MADE
      - PAYOUT_PENDING
      - PAID
      - REJECTED
      description: Состояние разбирательства претензионного обращения (раздел 3.2.1 ТЗ)
    TicketDecision:
      type: string
      enum:
      - FULL
      - PARTIAL
      - REJECTED
      description: Решение по претензии (Договор 5.8.8)
    ActKind:
      type: string
      enum:
      - MOVE_IN
      - MOVE_OUT
      description: Тип акта приёма-передачи
    SigningStatus:
      type: string
      enum:
      - one_signed
      - both_signed
      - disputed
      description: Статус подписания акта
    AuthorType:
      type: string
      enum:
      - requester
      - operator
      - system
      - ai
    SlaState:
      type: string
      enum:
      - none
      - ok
      - approaching
      - breached
      description: >-
        Состояние SLA для индикации (FR-4.3): none — без SLA; ok — в норме;
        approaching — осталось <20% временного окна; breached — дедлайн нарушен.
        Комбинация (худшее) дедлайнов первого ответа и решения; учитывает паузу.
    TicketSummary:
      type: object
      description: Краткая карточка заявки (для списков)
      required:
      - id
      - number
      - subject
      - status
      - priority
      - type
      - channel
      - created_at
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
          example: RH-2026-00042
          description: Человекочитаемый номер
        subject:
          type: string
        status:
          $ref: '#/components/schemas/TicketStatus'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        type:
          $ref: '#/components/schemas/TicketType'
        channel:
          $ref: '#/components/schemas/TicketChannel'
        requester_id:
          type: string
          format: uuid
        assignee_id:
          type:
          - string
          - 'null'
          format: uuid
        team:
          oneOf:
          - $ref: '#/components/schemas/TicketTeam'
          - type: 'null'
        first_response_due_at:
          type:
          - string
          - 'null'
          format: date-time
        resolution_due_at:
          type:
          - string
          - 'null'
          format: date-time
        sla_breached:
          type: boolean
          description: Нарушен ли дедлайн решения (расчётное поле; учитывает паузу и факт решения)
        sla_state:
          $ref: '#/components/schemas/SlaState'
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Ticket:
      allOf:
      - $ref: '#/components/schemas/TicketSummary'
      - type: object
        properties:
          allowed_status_transitions:
            type: array
            readOnly: true
            description: Статусы, в которые разрешён переход из текущего (машина состояний §3.2)
            items:
              $ref: '#/components/schemas/TicketStatus'
          description:
            type: string
            description: Первичное описание проблемы
          premises_id:
            type:
            - string
            - 'null'
            format: uuid
            description: Связанная квартира
          booking_id:
            type:
            - string
            - 'null'
            format: uuid
            description: Связанный договор/бронь
          collaborator_id:
            type:
            - string
            - 'null'
            format: uuid
          service_order_id:
            type:
            - string
            - 'null'
            format: uuid
            description: 'Связанный заказ коллаборанту (ADR-0005: разные сущности по ссылке)'
          chat_session_id:
            type:
            - string
            - 'null'
            format: uuid
            description: Сессия AI-чата, откуда эскалировано
          sla_policy_id:
            type:
            - string
            - 'null'
            format: uuid
          first_responded_at:
            type:
            - string
            - 'null'
            format: date-time
          resolved_at:
            type:
            - string
            - 'null'
            format: date-time
          closed_at:
            type:
            - string
            - 'null'
            format: date-time
          reopened_count:
            type: integer
            default: 0
          custom_fields:
            type: object
            additionalProperties: true
          access_level:
            type: string
            enum:
            - PUBLIC
            - LOGGED
            - AGENT
            - STAFF
            - LEGAL
            - HR_RESTRICTED
            description: Контур доступа (ADR-0003). Обычно LOGGED
          rating:
            type:
            - integer
            - 'null'
            minimum: 1
            maximum: 5
          rating_comment:
            type:
            - string
            - 'null'
          case_state:
            oneOf:
            - $ref: '#/components/schemas/TicketCaseState'
            - type: 'null'
            description: Состояние разбирательства (для претензионных типов)
          claim_amount:
            type:
            - number
            - 'null'
            description: Заявленная сумма ущерба (COMPENSATION)
          approved_amount:
            type:
            - number
            - 'null'
            description: Утверждённая к выплате сумма
          decision:
            oneOf:
            - $ref: '#/components/schemas/TicketDecision'
            - type: 'null'
          decision_reason:
            type:
            - string
            - 'null'
            description: Мотивировка (обязательна при PARTIAL/REJECTED)
          decision_notified_at:
            type:
            - string
            - 'null'
            format: date-time
          payout_due_at:
            type:
            - string
            - 'null'
            format: date-time
            description: Дедлайн выплаты (не более 10 рабочих дней)
          linked_payment_id:
            type:
            - string
            - 'null'
            format: uuid
          regress_obligation_id:
            type:
            - string
            - 'null'
            format: uuid
          policy_id:
            type:
