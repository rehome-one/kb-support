    WeeklySchedule:
      type: object
      additionalProperties: false
      description: >-
        Недельный график: день → массив интервалов рабочего времени. Интервал —
        пара ["HH:MM", "HH:MM"] (24ч, open < close). Отсутствующий день или
        пустой массив = выходной.
      properties:
        mon:
          $ref: '#/components/schemas/DayIntervals'
        tue:
          $ref: '#/components/schemas/DayIntervals'
        wed:
          $ref: '#/components/schemas/DayIntervals'
        thu:
          $ref: '#/components/schemas/DayIntervals'
        fri:
          $ref: '#/components/schemas/DayIntervals'
        sat:
          $ref: '#/components/schemas/DayIntervals'
        sun:
          $ref: '#/components/schemas/DayIntervals'
    DayIntervals:
      type: array
      description: Интервалы рабочего времени за день
      items:
        type: array
        minItems: 2
        maxItems: 2
        items:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
    BusinessHours:
      type: object
      required:
      - id
      - name
      - timezone
      - schedule
      - is_active
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        timezone:
          type: string
          description: IANA-таймзона (напр. Europe/Moscow)
        schedule:
          $ref: '#/components/schemas/WeeklySchedule'
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    BusinessHoursInput:
