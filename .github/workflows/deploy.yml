name: Build & Deploy KB Support

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  BACKEND_IMAGE_NAME: rehome-kb-support-backend
  FRONTEND_IMAGE_NAME: rehome-kb-support-frontend

concurrency:
  group: deploy-kb-support
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Selectel Container Registry
        env:
          CR_PUSH_TOKEN: ${{ secrets.SELECTEL_CR_PUSH_TOKEN }}
          CR_USERNAME: ${{ secrets.SELECTEL_CR_TOKEN_USER || secrets.SELECTEL_CR_USERNAME }}
        run: |
          test -n "$CR_USERNAME" || { echo "::error::Missing SELECTEL_CR_TOKEN_USER or SELECTEL_CR_USERNAME secret"; exit 1; }
          test -n "$CR_PUSH_TOKEN" || { echo "::error::Missing SELECTEL_CR_PUSH_TOKEN secret"; exit 1; }

          echo "$CR_PUSH_TOKEN" | docker login cr.selcloud.ru \
            --username "$CR_USERNAME" \
            --password-stdin

      - name: Build and push backend image
        env:
          SELECTEL_CR_URL: ${{ secrets.SELECTEL_CR_URL }}
        run: |
          test -n "$SELECTEL_CR_URL" || { echo "::error::Missing SELECTEL_CR_URL secret"; exit 1; }
          CR_PATH="${SELECTEL_CR_URL}/${{ env.BACKEND_IMAGE_NAME }}"
          docker build \
            -t $CR_PATH:${{ steps.meta.outputs.tag }} \
            -t $CR_PATH:latest \
            ./backend
          docker push $CR_PATH:${{ steps.meta.outputs.tag }}
          docker push $CR_PATH:latest

      - name: Build and push frontend image
        env:
          SELECTEL_CR_URL: ${{ secrets.SELECTEL_CR_URL }}
        run: |
          test -n "$SELECTEL_CR_URL" || { echo "::error::Missing SELECTEL_CR_URL secret"; exit 1; }
          CR_PATH="${SELECTEL_CR_URL}/${{ env.FRONTEND_IMAGE_NAME }}"
          docker build \
            -t $CR_PATH:${{ steps.meta.outputs.tag }} \
            -t $CR_PATH:latest \
            ./frontend
          docker push $CR_PATH:${{ steps.meta.outputs.tag }}
          docker push $CR_PATH:latest

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging stack
        uses: appleboy/ssh-action@master
        env:
          CR_TOKEN: ${{ secrets.SELECTEL_CR_PULL_TOKEN }}
          CR_TOKEN_USER: ${{ secrets.SELECTEL_CR_TOKEN_USER || secrets.SELECTEL_CR_USERNAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REGISTRY_URL: ${{ secrets.SELECTEL_CR_URL }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CR_TOKEN,CR_TOKEN_USER,IMAGE_TAG,REGISTRY_URL
          script: |
            set -e
            cd /app

            # Serialize host docker mutations across deploys
            exec 9>/tmp/rehome-deploy.lock
            flock -w 900 9 || { echo "❌ Timed out waiting for deploy lock"; exit 1; }

            test -n "$CR_TOKEN_USER" || { echo "Missing SELECTEL_CR_TOKEN_USER or SELECTEL_CR_USERNAME secret"; exit 1; }
            test -n "$CR_TOKEN" || { echo "Missing SELECTEL_CR_PULL_TOKEN secret"; exit 1; }
            test -n "$REGISTRY_URL" || { echo "Missing SELECTEL_CR_URL secret"; exit 1; }

            echo "🚀 Deploying KB Support to staging: $IMAGE_TAG"
            echo "$CR_TOKEN" | docker login --username "$CR_TOKEN_USER" --password-stdin cr.selcloud.ru

            # Pre-pull disk cleanup
            echo "📦 Disk before cleanup: $(df -h / | awk 'NR==2 {print $4" free / "$2" total"}')"
            docker container prune -f
            docker image prune -af --filter "until=72h"
            docker builder prune -af --filter "until=72h"
            AVAIL_GB=$(df --output=avail -BG / | tail -1 | tr -d 'G ')
            echo "📦 Disk after cleanup:  ${AVAIL_GB}G free"

            # Inject image tags into staging .env
            set_env() {
              key="$1"
              value="$2"
              file="/opt/rehome/staging/.env"
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                echo "${key}=${value}" >> "$file"
              fi
            }
            set_env KB_SUPPORT_BACKEND_TAG "$IMAGE_TAG"
            set_env KB_SUPPORT_FRONTEND_TAG "$IMAGE_TAG"

            # Pull and restart support containers
            docker compose -p staging --env-file /opt/rehome/staging/.env pull kb-support-backend kb-support-frontend
            docker compose -p staging --env-file /opt/rehome/staging/.env up -d --no-deps kb-support-postgres kb-support-backend kb-support-frontend

            # Run DB migrations
            echo "⚙️ Running database migrations..."
            docker compose -p staging --env-file /opt/rehome/staging/.env exec -T kb-support-backend alembic upgrade head

            # Reload nginx ingress
            docker exec rehome-nginx nginx -s reload || true

            docker image prune -f
            echo "✅ KB Support staging deployed successfully."

  deploy-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to prod stack
        uses: appleboy/ssh-action@master
        env:
          CR_TOKEN: ${{ secrets.SELECTEL_CR_PULL_TOKEN }}
          CR_TOKEN_USER: ${{ secrets.SELECTEL_CR_TOKEN_USER || secrets.SELECTEL_CR_USERNAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REGISTRY_URL: ${{ secrets.SELECTEL_CR_URL }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CR_TOKEN,CR_TOKEN_USER,IMAGE_TAG,REGISTRY_URL
          script: |
            set -e
            cd /app

            # Serialize host docker mutations across deploys
            exec 9>/tmp/rehome-deploy.lock
            flock -w 900 9 || { echo "❌ Timed out waiting for deploy lock"; exit 1; }

            test -n "$CR_TOKEN_USER" || { echo "Missing SELECTEL_CR_TOKEN_USER or SELECTEL_CR_USERNAME secret"; exit 1; }
            test -n "$CR_TOKEN" || { echo "Missing SELECTEL_CR_PULL_TOKEN secret"; exit 1; }
            test -n "$REGISTRY_URL" || { echo "Missing SELECTEL_CR_URL secret"; exit 1; }

            echo "🚀 Deploying KB Support to prod: $IMAGE_TAG"
            echo "$CR_TOKEN" | docker login --username "$CR_TOKEN_USER" --password-stdin cr.selcloud.ru

            # Pre-pull disk cleanup
            echo "📦 Disk before cleanup: $(df -h / | awk 'NR==2 {print $4" free / "$2" total"}')"
            docker container prune -f
            docker image prune -af --filter "until=72h"
            docker builder prune -af --filter "until=72h"
            AVAIL_GB=$(df --output=avail -BG / | tail -1 | tr -d 'G ')
            echo "📦 Disk after cleanup:  ${AVAIL_GB}G free"

            # Inject image tags into prod .env
            set_env() {
              key="$1"
              value="$2"
              file="/opt/rehome/prod/.env"
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                echo "${key}=${value}" >> "$file"
              fi
            }
            set_env KB_SUPPORT_BACKEND_TAG "$IMAGE_TAG"
            set_env KB_SUPPORT_FRONTEND_TAG "$IMAGE_TAG"

            # Pull and restart support containers
            docker compose -p prod --env-file /opt/rehome/prod/.env pull kb-support-backend kb-support-frontend
            docker compose -p prod --env-file /opt/rehome/prod/.env up -d --no-deps kb-support-postgres kb-support-backend kb-support-frontend

            # Run DB migrations
            echo "⚙️ Running database migrations..."
            docker compose -p prod --env-file /opt/rehome/prod/.env exec -T kb-support-backend alembic upgrade head

            # Reload nginx ingress
            docker exec rehome-nginx nginx -s reload || true

            docker image prune -f
            echo "✅ KB Support prod deployed successfully."
